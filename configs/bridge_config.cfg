# Production-inspired defaults for local development.
unix_socket_path=/tmp/ipc_socket_bridge.sock
fifo_path=/tmp/ipc_socket_bridge.fifo
tcp_bind_address=0.0.0.0
tcp_port=9090
queue_capacity=1024
max_payload_bytes=65536
epoll_timeout_ms=500
reconnect_initial_delay_ms=100
reconnect_max_delay_ms=5000
log_file=bridge.log
log_level=info
log_console=true
enable_fifo=true
enable_unix_socket=true
