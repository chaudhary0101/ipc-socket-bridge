name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgtest-dev clang-format clang-tidy
      - name: clang-format fix
        run: |
          find include src tests examples \( -name '*.hpp' -o -name '*.cpp' \) -print | xargs clang-format -i
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: cmake --build build -j"$(nproc)"
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: clang-tidy
        run: |
          find src/bridge \( -name '*.cpp' \) -print | xargs clang-tidy -p build --checks='bugprone-*,performance-*,readability-*,-readability-magic-numbers' --warnings-as-errors='bugprone-*,performance-*'
